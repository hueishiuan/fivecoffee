<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiveCoffee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --coffee-brown: #4e342e;
            --wellness-green: #e8f5e9;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fcfaf8; }
        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&q=80&w=1200');
            background-size: cover; background-position: center;
            height: 300px; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .scroll-arrow {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.8);
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }
        .section-title { margin-bottom: 5px; text-align: center; }
        .card { border: 1px solid #00306016; border-radius: 15px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .price-tag { color: #003060; font-weight: bold; font-size: 1.25rem; }
        .service-card { background-color: var(--wellness-green); }
    </style>
</head>
<body>

    <div class="hero-section text-center">
        <div>
            <h1 class="display-4 fw-bold">FiveCoffee</h1>
            <p class="lead">五杯咖啡，只想給你一杯好咖啡</p>
        </div>
        <div class="scroll-arrow">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 16 16">
                <path d="M13.902.334a.5.5 0 0 1-.28.65l-2.254.902-.4 1.927c.376.095.715.215.972.367.228.135.56.396.56.82 0 .046-.004.09-.011.132l-.962 9.068a1.28 1.28 0 0 1-.524.93c-.488.34-1.494.87-3.01.87-1.516 0-2.522-.53-3.01-.87a1.28 1.28 0 0 1-.524-.93L3.51 5.132A.78.78 0 0 1 3.5 5c0-.424.332-.685.56-.82.262-.154.607-.276.99-.372C5.824 3.614 6.867 3.5 8 3.5c.712 0 1.389.045 1.985.127l.464-2.215a.5.5 0 0 1 .303-.356l2.5-1a.5.5 0 0 1 .65.278zM9.768 4.607A13.991 13.991 0 0 0 8 4.5c-1.076 0-2.005.11-2.56.224-.283.058-.5.114-.624.186-.114.068-.161.134-.175.17l.96 9.065c.013.12.084.227.182.296.262.183 1.12.659 2.217.659 1.098 0 1.956-.476 2.218-.659.097-.069.168-.176.181-.296l.96-9.065c-.014-.036-.061-.102-.175-.17-.124-.072-.34-.128-.623-.186a13.99 13.99 0 0 0-1.792-.117z"/>
            </svg>
        </div>
    </div>

    <div class="container py-5">
        <h2 class="section-title">近期豆單</h2>
        <p class="text-center text-muted mb-4">精選新鮮烘焙，風味絕佳</p>
        
        <div class="row g-4 mb-5 " id="beanContainer">
            <div class="text-center text-muted" id="loadingText">
                載入豆單中...
            </div>
        </div>
    </div>

    <script>
        // ！！！重要！！！
        // 請將下方的網址替換成你的 Google 試算表「發布到網路」的 CSV 網址
        const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSVApdQ5j79F_8KdIshNCqMnHuqWPA5I-IsXdWyR_FdFJRGCNmIJiUMvRSegTSRSlTcEchV40GwqKth/pub?output=csv";

        document.addEventListener("DOMContentLoaded", fetchData);

        function fetchData() {
            Papa.parse(sheetCsvUrl, {
                download: true,
                header: true,
                complete: function(results) {
                    const parsedData = results.data;
                    renderCards(parsedData);
                },
                error: function(error) {
                    console.error("Data fetch failed:", error);
                    document.getElementById("beanContainer").innerHTML = "<p class='text-center text-danger'>無法載入豆單，請稍後再試。</p>";
                }
            });
        }

        function renderCards(data) {
            const container = document.getElementById("beanContainer");
            let htmlOutput = "";

            data.forEach(item => {
                // 避開空白列
                if (!item.Name) return;

                htmlOutput += `
                    <div class="col-md-4">
                        <div class="card h-100 p-3">
                            <div class="card-body">
                                <span class="badge rounded-pill mb-3 px-3 py-2 fs-7 fw-normal text-white" style="background-color: #003060;">${item.RoastLevel}</span>
                                <h5 class="card-title fs-4">${item.Name}</h5>
                                <p class="text-black">${item.Origin}</p>
                                <p style="color: #003060;">${item.Description}</p>
                                <div class="d-flex justify-content-end align-items-center mt-3">
                                    <span class="price-tag">NT$ ${item.Price} <small class="text-muted fw-normal" style="font-size: 0.7em;">/200g</small></span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = htmlOutput;
        }
    </script>
</body>
</html>
